<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <title>Аудиокнига</title>
    <link rel="icon" href="img/иконка.png" type="image/png">
</head>
<body>
<div class="all">
    <a href="index.html">
        <header>
            <div class="hed_1" style="margin-top: 10px; margin-bottom: 10px;">
                <img class="ikon" src="img/иконка_2.png" height="50px" alt="AudioRUS">
                <div style="width: 100%; display: flex; align-items: center; justify-content: end;">
                    <div class="voiti" onclick="alert('Вход в разработке')">Войти</div>
                </div>
            </div>
        </header>
    </a>

    <div class="name_1">
        <h1 class="name_2" id="book-title">Загрузка...</h1>
    </div>

    <div class="book-layout">
        <img class="image" id="book-cover" src="" alt="Обложка книги" loading="lazy">
        <div class="book-details">
            <div class="info" id="book-info">
                <div style="height: 100px; display: flex; align-items: center; justify-content: center;">
                    <p style="font-size: 20px; color: #888;">Загрузка информации о книге...</p>
                </div>
            </div>
            <div class="player">
                <div class="buttons">
                    <img src="img/предыдущий.png" alt="Предыдущий трек" class="play" onclick="pred()">
                    <img id="pl" src="img/плей.png" class="play" onclick="clicker()" alt="Плей/Пауза">
                    <img src="img/следующий.png" alt="Следующий трек" class="play" onclick="sled()">
                </div>
                <div class="line">
                    <div id="l" class="bar" style="width: 0%;"></div>
                </div>
                <p id="p">0:00/0:00</p>
                <div class="pleylist" id="pleylist"></div>
            </div>
        </div>
    </div>

    <div class="book-nav"></div>

    <div class="annotation" id="book-annotation"></div>

    <footer>
        <div class="fd"><img src="img/прав.png" alt="Правообладателям"><a href="#" class="f">Право-обладателям</a></div>
        <div class="fd"><img src="img/Telegram.png" alt="Telegram"><a href="https://t.me/Audio_RUS_chanel" class="f">Наш Телеграмм канал</a></div>
        <div class="fd"><img src="img/обр_св.png" alt="Обратная связь"><a href="#" class="f">Обратная связь</a></div>
        <div class="fd"><img src="img/иконка.png" alt="AudioRUS"><a href="index.html" class="f">AudioRUS</a></div>
    </footer>
</div>
<button class="theme-toggle" title="Переключить тему">🌓</button>
<script src="books-data.js"></script>
<script src="main.js"></script>
<script src="book-loader.js"></script>
<script src="theme.js"></script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('/Sorokin_Ivan_the_end_project/sw.js')
            .then(function(reg) {
                console.log('SW зарегистрирован');
            })
            .catch(function(err) {
                console.log('SW ошибка:', err);
            });
    });
}
</script>
</body>
</html>
